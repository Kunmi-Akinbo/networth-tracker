spring:
  application:
    name: networth-api
  
  datasource:
    url: jdbc:postgresql://localhost:5432/networth
    username: postgres
    password: secret
    driver-class-name: org.postgresql.Driver
  
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  
  flyway:
    enabled: true
    locations: classpath:db/migration
  
  data:
    redis:
      host: localhost
      port: 6379

server:
  port: 8080

jwt:
  secret: your-secret-key-change-this-in-production
  expiration: 86400000 # 24 hours in milliseconds
  refresh-expiration: 604800000 # 7 days in milliseconds
